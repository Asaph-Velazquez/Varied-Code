<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introduction to Cryptography - Cifrado de Imágenes BMP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0f0f0f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #1a1a1a;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            max-width: 1400px;
            width: 100%;
            padding: 50px;
            border: 2px solid #ffc107;
        }

        .sections-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 35px;
        }

        h1 {
            text-align: center;
            color: #ffc107;
            margin-bottom: 10px;
            font-size: 3em;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .subtitle {
            text-align: center;
            color: #b0b0b0;
            margin-bottom: 50px;
            font-size: 1.2em;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 300;
        }

        .section {
            padding: 30px;
            background: #222;
            border-radius: 16px;
            border: 1px solid rgba(255, 193, 7, 0.3);
            transition: border-color 0.3s ease;
            height: 100%;
        }

        .section:hover {
            border-color: #ffc107;
        }

        .section-title {
            color: #ffc107;
            margin-bottom: 25px;
            font-size: 1.6em;
            font-weight: 700;
            display: flex;
            align-items: center;
            letter-spacing: 0.5px;
        }

        .section-title::before {
            content: "";
            width: 4px;
            height: 28px;
            background: linear-gradient(180deg, #ffc107, #ff9800);
            margin-right: 15px;
            border-radius: 2px;
            box-shadow: 0 0 10px rgba(255, 193, 7, 0.5);
        }

        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: #e0e0e0;
            font-weight: 600;
            font-size: 0.95em;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 14px 20px;
            border: 2px solid rgba(255, 193, 7, 0.2);
            border-radius: 12px;
            font-size: 1em;
            transition: all 0.3s ease;
            font-family: inherit;
            background: rgba(0, 0, 0, 0.4);
            color: #ffffff;
        }

        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: #ffc107;
            box-shadow: 
                0 0 0 3px rgba(255, 193, 7, 0.1),
                0 5px 20px rgba(255, 193, 7, 0.2);
            background: rgba(0, 0, 0, 0.6);
        }

        input[type="text"]::placeholder,
        textarea::placeholder {
            color: #666;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        .file-input-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .file-input-label {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px 30px;
            background: #ffc107;
            color: #000;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 700;
            font-size: 1em;
            letter-spacing: 0.5px;
        }

        .file-input-label:hover {
            background: #ffcd38;
            transform: translateY(-2px);
        }

        .file-input-label span {
            position: relative;
        }

        .file-input-label::after {
            content: "▶";
            margin-right: 10px;
            font-size: 1.3em;
        }

        input[type="file"] {
            display: none;
        }

        .file-name {
            margin-top: 12px;
            padding: 12px 18px;
            background: rgba(255, 193, 7, 0.05);
            border-radius: 10px;
            color: #b0b0b0;
            font-size: 0.9em;
            text-align: center;
            border: 1px solid rgba(255, 193, 7, 0.1);
            font-style: italic;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 40px;
        }

        button {
            padding: 18px 35px;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button span {
            position: relative;
        }

        .btn-encrypt {
            background: #ffc107;
            color: #000;
        }

        .btn-encrypt:hover {
            background: #ffcd38;
        }

        .btn-decrypt {
            background: #333;
            color: #ffc107;
            border: 2px solid #ffc107;
        }

        .btn-decrypt:hover {
            background: #444;
        }

        .result-section {
            margin-top: 35px;
            padding: 25px;
            background: #222;
            border-radius: 16px;
            border-left: 5px solid #ffc107;
            display: none;
        }

        .result-section.show {
            display: block;
            animation: slideDown 0.4s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-title {
            color: #ffc107;
            font-weight: 700;
            margin-bottom: 15px;
            font-size: 1.3em;
            display: flex;
            align-items: center;
        }

        .result-title::before {
            content: "✔";
            margin-right: 10px;
            font-size: 1.2em;
            background: #ffc107;
            color: #000;
            width: 25px;
            height: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-weight: bold;
        }

        .result-content {
            color: #e0e0e0;
            font-size: 1.05em;
            padding: 15px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 10px;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .info-box {
            background: rgba(255, 193, 7, 0.1);
            border: 2px solid rgba(255, 193, 7, 0.4);
            border-radius: 12px;
            padding: 18px;
            margin-top: 25px;
            color: #e0e0e0;
            display: flex;
            align-items: flex-start;
        }

        .info-box::before {
            content: "ℹ";
            font-size: 1.2em;
            margin-right: 12px;
            flex-shrink: 0;
            background: #ffc107;
            color: #000;
            width: 24px;
            height: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-weight: bold;
        }

        .info-box strong {
            color: #ffc107;
        }

        /* Scrollbar simplificado */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        ::-webkit-scrollbar-thumb {
            background: #ffc107;
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #ffcd38;
        }

        .author {
            text-align: center;
            color: #888;
            font-size: 0.85em;
            font-weight: 400;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 40px;
            padding: 8px 20px;
            display: inline-block;
            left: 50%;
            position: relative;
            transform: translateX(-50%);
            border: 1px solid rgba(255, 193, 7, 0.2);
            border-radius: 20px;
            background: rgba(255, 193, 7, 0.04);
        }

        .author::before {
            content: "✦ ";
            color: #ffc107;
            font-size: 0.8em;
        }

        .author::after {
            content: " ✦";
            color: #ffc107;
            font-size: 0.8em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⬡ Cifrado de Imágenes BMP</h1>
        <p class="subtitle">Introducción a la Criptografía</p>
        <p class="author">Velazquez Parral Saul Asaph</p>

        <!-- Secciones lado a lado -->
        <div class="sections-row">
            <!-- Sección de Cifrado -->
            <div class="section">
                <h2 class="section-title">Cifrar Mensaje</h2>
                
                <div class="input-group">
                    <label for="bmpFile">Seleccionar imagen BMP:</label>
                    <div class="file-input-wrapper">
                        <label for="bmpFile" class="file-input-label">
                            <span>Seleccionar Archivo BMP</span>
                        </label>
                        <input type="file" id="bmpFile" accept=".bmp" onchange="updateFileName(this)">
                        <div class="file-name" id="fileName">Ningún archivo seleccionado</div>
                    </div>
                </div>

                <div class="input-group">
                    <label for="secretMessage">Mensaje secreto a ocultar:</label>
                    <textarea id="secretMessage" placeholder="Escribe tu mensaje secreto aquí o carga un archivo TXT..." maxlength="10000"></textarea>
                </div>

                <div class="input-group">
                    <button class="btn-load-txt" onclick="loadTextFile()" style="width: 100%; background: #444; color: #ffc107; border: 2px solid #ffc107; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 600;">
                        <span>Cargar mensaje desde archivo TXT</span>
                    </button>
                </div>

                <div style="margin-top: 25px;">
                    <button class="btn-encrypt" onclick="encrypt()" style="width: 100%;"><span>▶ Cifrar</span></button>
                </div>
            </div>

            <!-- Sección de Descifrado -->
            <div class="section">
                <h2 class="section-title">Descifrar Mensaje</h2>

                <div class="input-group">
                    <label for="encryptedBmpFile">Seleccionar imagen BMP cifrada:</label>
                    <div class="file-input-wrapper">
                        <label for="encryptedBmpFile" class="file-input-label">
                            <span>Seleccionar Archivo BMP Cifrado</span>
                        </label>
                        <input type="file" id="encryptedBmpFile" accept=".bmp" onchange="updateEncryptedFileName(this)">
                        <div class="file-name" id="encryptedFileName">Ningún archivo seleccionado</div>
                    </div>
                </div>

                <div style="margin-top: 25px;">
                    <button class="btn-decrypt" onclick="decrypt()" style="width: 100%;"><span>◀ Descifrar</span></button>
                </div>
            </div>
        </div>

        <!-- Sección de Resultados -->
        <div class="result-section" id="resultSection">
            <div class="result-title" id="resultTitle">Resultado</div>
            <div class="result-content" id="resultContent"></div>
        </div>
    </div>

    <script>
        function updateFileName(input) {
            const fileName = input.files[0] ? input.files[0].name : 'Ningún archivo seleccionado';
            document.getElementById('fileName').textContent = fileName;
            if (input.files[0]) {
                document.getElementById('fileName').style.color = '#ffc107';
                document.getElementById('fileName').style.fontStyle = 'normal';
            }
        }

        function updateEncryptedFileName(input) {
            const fileName = input.files[0] ? input.files[0].name : 'Ningún archivo seleccionado';
            document.getElementById('encryptedFileName').textContent = fileName;
            if (input.files[0]) {
                document.getElementById('encryptedFileName').style.color = '#ffc107';
                document.getElementById('encryptedFileName').style.fontStyle = 'normal';
            }
        }
        
        function resetEncryptForm() {
            document.getElementById('bmpFile').value = '';
            document.getElementById('fileName').textContent = 'Ningún archivo seleccionado';
            document.getElementById('fileName').style.color = '#b0b0b0';
            document.getElementById('fileName').style.fontStyle = 'italic';
            document.getElementById('secretMessage').value = '';
            console.log('[JS] Formulario de cifrado reseteado');
        }
        
        function resetDecryptForm() {
            document.getElementById('encryptedBmpFile').value = '';
            document.getElementById('encryptedFileName').textContent = 'Ningún archivo seleccionado';
            document.getElementById('encryptedFileName').style.color = '#b0b0b0';
            document.getElementById('encryptedFileName').style.fontStyle = 'italic';
            console.log('[JS] Formulario de descifrado reseteado');
        }
        
        function downloadEncryptedFile(base64Data, fileName) {
            console.log('[JS downloadEncryptedFile] Preparando descarga...');
            // Crear un blob del archivo
            const byteCharacters = atob(base64Data);
            const byteNumbers = new Array(byteCharacters.length);
            for (let i = 0; i < byteCharacters.length; i++) {
                byteNumbers[i] = byteCharacters.charCodeAt(i);
            }
            const byteArray = new Uint8Array(byteNumbers);
            const blob = new Blob([byteArray], { type: 'image/bmp' });
            
            // Crear enlace de descarga
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            console.log('[JS downloadEncryptedFile] Descarga iniciada');
        }

        function showResult(title, content) {
            console.log('[JS showResult] Llamado con:', { title, content });
            const resultSection = document.getElementById('resultSection');
            const resultTitle = document.getElementById('resultTitle');
            const resultContent = document.getElementById('resultContent');
            
            if (!resultSection || !resultTitle || !resultContent) {
                console.error('[JS showResult] No se encontraron elementos del DOM');
                return;
            }
            
            resultTitle.textContent = title;
            resultContent.textContent = content;
            resultSection.classList.add('show');
            resultSection.style.display = 'block';
            
            console.log('[JS showResult] Resultado mostrado exitosamente');
            
            // Scroll suave hacia el resultado
            resultSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
        
        function loadTextFile() {
            console.log('[JS loadTextFile] Solicitando carga de archivo...');
            
            // Crear input temporal
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.txt';
            
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                console.log('[JS loadTextFile] Archivo seleccionado:', file.name);
                
                const reader = new FileReader();
                reader.onload = (event) => {
                    const content = event.target.result;
                    const base64Content = btoa(unescape(encodeURIComponent(content)));
                    
                    if (window.javaConnector) {
                        window.javaConnector.loadTextFile(base64Content, file.name);
                    } else {
                        // Modo sin Java
                        document.getElementById('secretMessage').value = content;
                    }
                };
                reader.readAsText(file);
            };
            
            input.click();
        }
        
        function encrypt() {
            const fileInput = document.getElementById('bmpFile');
            const message = document.getElementById('secretMessage').value;
            
            console.log('[JS encrypt] Iniciando...');
            
            if (!fileInput.files[0]) {
                alert('⚠ Por favor selecciona un archivo BMP');
                return;
            }
            
            if (!message.trim()) {
                alert('⚠ Por favor escribe un mensaje secreto');
                return;
            }
            
            const file = fileInput.files[0];
            console.log('[JS encrypt] Archivo:', file.name);
            
            // Leer archivo BMP
            const reader = new FileReader();
            reader.onload = (event) => {
                const arrayBuffer = event.target.result;
                const bytes = new Uint8Array(arrayBuffer);
                
                // Convertir a base64
                let binary = '';
                for (let i = 0; i < bytes.length; i++) {
                    binary += String.fromCharCode(bytes[i]);
                }
                const base64Data = btoa(binary);
                
                console.log('[JS encrypt] Datos preparados, tamaño:', bytes.length);
                
                // Llamar a Java
                if (window.javaConnector) {
                    try {
                        window.javaConnector.encrypt(message, base64Data, file.name);
                        console.log('[JS encrypt] Datos enviados a Java');
                        // Resetear inputs inmediatamente después de enviar
                        resetEncryptForm();
                    } catch (error) {
                        console.error('[JS encrypt] Error:', error);
                        alert('⚠ Error al cifrar: ' + error);
                    }
                } else {
                    showResult('⚠ Modo demostración', 'La integración con Java está en proceso.');
                }
            };
            
            reader.onerror = (error) => {
                console.error('[JS encrypt] Error al leer archivo:', error);
                alert('⚠ Error al leer el archivo BMP');
            };
            
            reader.readAsArrayBuffer(file);
        }

        function decrypt() {
            const fileInput = document.getElementById('encryptedBmpFile');
            
            console.log('[JS decrypt] Iniciando...');
            
            if (!fileInput.files[0]) {
                alert('⚠ Por favor selecciona un archivo BMP cifrado');
                return;
            }
            
            const file = fileInput.files[0];
            console.log('[JS decrypt] Archivo:', file.name);
            
            // Leer archivo BMP
            const reader = new FileReader();
            reader.onload = (event) => {
                const arrayBuffer = event.target.result;
                const bytes = new Uint8Array(arrayBuffer);
                
                // Convertir a base64
                let binary = '';
                for (let i = 0; i < bytes.length; i++) {
                    binary += String.fromCharCode(bytes[i]);
                }
                const base64Data = btoa(binary);
                
                console.log('[JS decrypt] Datos preparados, tamaño:', bytes.length);
                
                // Llamar a Java
                if (window.javaConnector) {
                    try {
                        window.javaConnector.decrypt(base64Data, file.name);
                        console.log('[JS decrypt] Datos enviados a Java');
                        // Resetear input inmediatamente después de enviar
                        resetDecryptForm();
                    } catch (error) {
                        console.error('[JS decrypt] Error:', error);
                        alert('⚠ Error al descifrar: ' + error);
                    }
                } else {
                    showResult('⚠ Modo demostración', 'La integración con Java está en proceso.');
                }
            };
            
            reader.onerror = (error) => {
                console.error('[JS decrypt] Error al leer archivo:', error);
                alert('⚠ Error al leer el archivo BMP cifrado');
            };
            
            reader.readAsArrayBuffer(file);
        }
    </script>
</body>
</html>
